<!doctype html>
<html lang="en">
  <head>
    <!-- (Head normal: solo estilos/título, no lógica) -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Product</title>

    <!-- Bootstrap: solo UI/estilos, no conecta con backend -->
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
    />
  </head>

  <body>
    <div class="container">
      <h2>Edit Product</h2>

      <!-- Navegación: vuelve a /products (ruta del frontend Flask) -->
      <a href="/products" class="btn btn-primary mb-3">Back to products</a>

      <!-- OJO: esto es un <title> dentro del body (no afecta lógica, es redundante) -->
      <title>Edit Product</title>

      <h2>Edit Product</h2>

      <!-- Formulario de edición.
           IMPORTANTE para la lógica:
           - input hidden #product-id: ahí se guarda el id del producto
           - inputs #name #description #price #stock: el JS los llena y luego los lee para actualizar -->
      <form id="edit-product-form">
        <input type="hidden" id="product-id" />

        <div class="form-group">
          <input type="text" class="form-control" id="name" required />
        </div>

        <div class="form-group">
          <input type="text" class="form-control" id="description" required />
        </div>

        <div class="form-group">
          <input type="number" step="0.01" class="form-control" id="price" required />
        </div>

        <div class="form-group">
          <input type="number" class="form-control" id="stock" required />
        </div>

        <!-- Botón que dispara la lógica de actualización.
             Llama a updateProduct() que está definida en /static/scriptProducts.js -->
        <button type="button" class="btn btn-primary" onclick="updateProduct()">
          Save Changes
        </button>
      </form>
    </div>

    <!-- jQuery: no es clave para la lógica de productos aquí,
         pero puede estar por compatibilidad con Bootstrap u otros modales -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>

    <!-- Script principal del CRUD de productos.
         Aquí está la función updateProduct() que:
         - lee los valores del formulario
         - hace fetch PUT al Products Service
         - redirige luego a /products -->
    <script src="/static/scriptProducts.js"></script>

    <script>
        // (Esta parte es la lógica específica de esta pantalla)

        // Esto crea un objeto para leer parámetros de la URL (?algo=...)
        // PERO en tu caso realmente NO se usa, porque el id lo trae Flask/Jinja como {{id}}.
        const urlParams = new URLSearchParams(window.location.search);

        // El id del producto viene desde el backend Flask cuando renderiza el template:
        // render_template('editProduct.html', id=id)
        const productId = {{id}}

        // Aquí se hace una petición al microservicio de productos para traer
        // la información del producto y llenar el formulario.
        fetch(`http://192.168.100.3:5003/api/products/${productId}`)
      .then(response => response.json())
      .then(data => {

          // Llenamos el input oculto con el id (updateProduct lo usa luego para el PUT)
          document.getElementById('product-id').value = data.id;

          // Llenamos los campos para que el usuario vea la info actual.
          document.getElementById('name').value = data.name;
          document.getElementById('description').value = data.description;
          document.getElementById('price').value = data.price;
          document.getElementById('stock').value = data.stock;
      })
      // Si falla la conexión o el backend no responde, se ve en consola.
      .catch(error => console.error('Error:', error));
    </script>
  </body>
</html>
