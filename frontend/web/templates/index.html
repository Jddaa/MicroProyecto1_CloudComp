<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Store - Welcome</title>

    <!-- Bootstrap solo se usa para estilos visuales -->
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
    />
  </head>

  <body>

    <!-- NAVBAR
         Los enlaces llaman a rutas del frontend Flask -->
    <nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">

      <!-- Ruta principal del frontend -->
      <a class="navbar-brand" href="/">Mini Store</a>

      <div class="collapse navbar-collapse" id="navbarCollapse">
        <ul class="navbar-nav ml-auto">

          <!-- Ruta /products
               Página de administración de productos -->
          <li class="nav-item">
            <a class="nav-link" href="/products">Admin: Products</a>
          </li>

          <!-- Ruta /users
               Página de administración de usuarios -->
          <li class="nav-item">
            <a class="nav-link" href="/users">Admin: Users</a>
          </li>

          <!-- Ruta /admin/orders
               Panel admin para ver todas las órdenes -->
          <li class="nav-item">
            <a class="nav-link" href="/admin/orders">Admin: Orders</a>
          </li>

        </ul>
      </div>
    </nav>


    <!-- SECCIÓN PRINCIPAL -->
    <div class="container hero">
      <div class="jumbotron">

        <!-- Opciones de entrada al sistema -->
        <div class="row">

          <!-- ENTRADA ADMIN -->
          <div class="col-md-6 mb-3">
            <div class="role-card">

              <!-- Este botón redirige directamente
                   a la página de productos -->
              <a href="/products" class="btn btn-primary mr-2">
                Login as Admin
              </a>

            </div>
          </div>


          <!-- ENTRADA CLIENTE -->
          <div class="col-md-6 mb-3">
            <div class="role-card">

              <!-- Este botón abre el modal de login -->
              <button
                class="btn btn-success"
                data-toggle="modal"
                data-target="#loginModal">

                Login as Client
              </button>

            </div>
          </div>

        </div>

        <!-- Contenedor donde el JS inserta alertas -->
        <div id="alertBox" class="mt-3"></div>

      </div>
    </div>



    <!-- MODAL DE LOGIN -->
    <div class="modal fade" id="loginModal" tabindex="-1" role="dialog">

      <div class="modal-dialog" role="document">
        <div class="modal-content">

          <div class="modal-body">

            <!-- FORMULARIO DE LOGIN -->
            <form id="loginForm">

              <!-- Estos IDs son usados por scriptAuth.js
                   para leer username y password -->
              <div class="form-group">
                <input id="loginUsername" type="text" class="form-control" required />
              </div>

              <div class="form-group">
                <input id="loginPassword" type="password" class="form-control" required />
              </div>

              <!-- Cuando se envía el formulario
                   el JS intercepta el submit -->
              <button type="submit" class="btn btn-success btn-block">
                Login
              </button>

            </form>

            <!-- Nota sobre sesiones -->
            <small class="text-muted d-block mt-2">
              (Uses session cookie: requests will include credentials)
            </small>

          </div>

        </div>
      </div>

    </div>



    <!-- LIBRERÍAS JS -->

    <!-- jQuery requerido por Bootstrap -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>

    <!-- Bootstrap JS (modales, alerts, etc.) -->
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>



    <!-- SCRIPT DE AUTENTICACIÓN -->
    <script src="/static/scriptAuth.js"></script>

    <!-- Este script maneja:
         - el evento submit del formulario #loginForm
         - la llamada fetch al Users Service:
           POST /api/login
         - guardar username/email en localStorage
         - cerrar el modal
         - redirigir al usuario a /shop -->

  </body>
</html>
