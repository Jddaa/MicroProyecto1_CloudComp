<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User</title>

    <!-- Bootstrap solo afecta estilos visuales -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>

<body>

<div class="container">
    <h2>Edit User</h2>

    <!-- Navegación hacia la ruta /users del frontend Flask -->
    <a href="/users" class="btn btn-primary mb-3">Back to Home</a>

    <!-- Formulario de edición.
         IMPORTANTE para la lógica:
         Los IDs de los inputs son usados por scriptUsers.js para leer los datos
         y enviar el update al backend -->
    <form id="edit-user-form">

        <!-- Input oculto donde se guarda el ID del usuario -->
        <input type="hidden" id="user-id" value="">

        <!-- Estos campos serán llenados automáticamente con fetch -->
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" class="form-control" id="name" required>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" class="form-control" id="email" required>
        </div>

        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" class="form-control" id="username" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" class="form-control" id="password" required>
        </div>

        <!-- Botón que ejecuta updateUser()
             Esta función está definida en scriptUsers.js
             y hace un PUT al Users Service -->
        <button type="submit" class="btn btn-primary" onclick="updateUser()">Save Changes</button>
    </form>
</div>

<!-- jQuery: usado principalmente por Bootstrap -->
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>

<!-- Script principal del CRUD de usuarios.
     Aquí están las funciones:
     - getUsers()
     - createUser()
     - updateUser()
     - deleteUser() -->
<script src="/static/scriptUsers.js"></script>

<script>

    // Lee parámetros de la URL.
    const urlParams = new URLSearchParams(window.location.search);

    // Esta línea está comentada porque en este sistema
    // el ID lo envía Flask directamente al template.
    // const userId = urlParams.get('id');

    // Flask inyecta el id del usuario cuando renderiza el template:
    // render_template("editUser.html", id=id)
    const userId = {{id}}

    // Se hace una petición al Users Service
    // para obtener los datos del usuario a editar.
    fetch(`http://192.168.100.3:5002/api/users/${userId}`)

        .then(response => response.json())

        .then(data => {

            // Se llenan los campos del formulario
            // con los datos actuales del usuario.

            document.getElementById('user-id').value = data.id;

            document.getElementById('name').value = data.name;

            document.getElementById('email').value = data.email;

            document.getElementById('username').value = data.username;

            document.getElementById('password').value = data.password;
        })

        // Si falla la conexión al backend se muestra en consola.
        .catch(error => console.error('Error:', error));

</script>

</body>
</html>
