<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Página donde el usuario ve sus propias órdenes -->
    <title>My Orders</title>

    <!-- Bootstrap solo afecta estilos -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />
  </head>

  <body>

    <!-- NAVBAR
         Navegación entre páginas del frontend Flask -->
    <nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">

      <!-- Ruta principal -->
      <a class="navbar-brand" href="/">Mini Store</a>

      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ml-auto align-items-center">

          <!-- Página de catálogo -->
          <li class="nav-item mr-2">
            <a class="nav-link" href="/shop">Shop</a>
          </li>

          <!-- Página del carrito -->
          <li class="nav-item mr-2">
            <a class="nav-link" href="/cart">Cart</a>
          </li>

          <!-- Página actual: órdenes del usuario -->
          <li class="nav-item mr-2">
            <a class="nav-link active" href="/my-orders">My Orders</a>
          </li>

          <!-- Botón logout usado por el JS -->
          <li class="nav-item">
            <button id="btnLogout" class="btn btn-outline-light btn-sm">
              Logout
            </button>
          </li>

        </ul>
      </div>
    </nav>



    <div class="container">

      <div class="d-flex justify-content-between align-items-center mb-3">

        <h2 class="mb-0">My Orders</h2>

        <!-- Botón que el JS usa para volver a cargar las órdenes -->
        <button id="btnRefresh" class="btn btn-secondary btn-sm">
          Refresh
        </button>

      </div>


      <!-- Aquí el JS inserta mensajes (errores, info, etc.) -->
      <div id="alertBox"></div>


      <!-- TABLA DONDE EL JS INSERTA LAS ÓRDENES -->

      <div class="table-responsive">
        <table class="table table-striped" id="ordersTable">

          <thead>
            <tr>
              <th>ID</th>
              <th>Total</th>
              <th>Created</th>
              <th>Actions</th>
            </tr>
          </thead>

          <!-- El scriptOrdersMy.js agrega aquí las filas de órdenes -->
          <tbody></tbody>

        </table>
      </div>

    </div>



    <!-- MODAL PARA VER LOS PRODUCTOS DE UNA ORDEN -->

    <div class="modal fade" id="orderModal" tabindex="-1">

      <div class="modal-dialog modal-lg">
        <div class="modal-content">

          <div class="modal-header">

            <h5 class="modal-title">Order Details</h5>

            <!-- Cierra el modal -->
            <button type="button" class="close" data-dismiss="modal">
              <span>&times;</span>
            </button>

          </div>

          <div class="modal-body">

            <!-- El JS inserta aquí los productos de la orden -->
            <div id="orderDetails"></div>

          </div>

        </div>
      </div>
    </div>



    <!-- LIBRERÍAS JS -->

    <!-- jQuery requerido por Bootstrap -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>

    <!-- Bootstrap JS para modales y alerts -->
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>



    <!-- SCRIPT PRINCIPAL DE ESTA PÁGINA -->
    <script src="/static/scriptOrdersMy.js"></script>

    <!-- Este script controla toda la lógica de esta página:

        1️⃣ loadMyOrders()
           Hace fetch al Orders Service para obtener
           SOLO las órdenes del usuario logueado.

           Endpoint típico:
           GET http://192.168.100.3:5004/api/orders/my

        2️⃣ Inserta las órdenes en:
           #ordersTable tbody

        3️⃣ Botón Refresh (#btnRefresh)
           vuelve a ejecutar loadMyOrders()

        4️⃣ Botón View
           llama viewOrder(orderId)

        5️⃣ viewOrder(orderId)
           hace fetch:
           GET /api/orders/{id}

           y muestra los productos dentro de:
           #orderDetails

        6️⃣ Abre el modal:
           $("#orderModal").modal("show")

        7️⃣ Botón Logout (#btnLogout)
           llama logout() desde el script
           que borra la sesión y redirige a /

    -->

  </body>
</html>
