<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Store - Cart</title>

    <!-- Bootstrap CSS: solo estilo visual (no lógica de negocio), pero afecta cómo se ven botones/tabla/alerts -->
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
    />

    <style>
      /* Estilos locales. No afecta conexiones, solo presentación */
      body { padding-top: 70px; padding-bottom: 30px; }
      .qty { max-width: 90px; }
    </style>
  </head>

  <body>
    <!-- Navbar: enlaces de navegación (rutas del frontend Flask) -->
    <nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
      <a class="navbar-brand" href="/">Mini Store</a>

      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ml-auto align-items-center">
          <li class="nav-item mr-2">
            <!-- Va a la ruta /shop (catálogo) -->
            <a class="nav-link" href="/shop">Shop</a>
          </li>
          <li class="nav-item">
            <!-- Este botón lo usa el JS (scriptCart.js) para cerrar sesión -->
            <button id="btnLogout" class="btn btn-outline-light btn-sm">Logout</button>
          </li>
        </ul>
      </div>
    </nav>

    <div class="container">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">Your Cart</h2>

        <!-- Este botón lo usa el JS para borrar el carrito (localStorage) -->
        <button id="btnClear" class="btn btn-outline-danger btn-sm">Clear cart</button>
      </div>

      <!-- Contenedor donde el JS inyecta alertas (éxito/error/warning/info) -->
      <div id="alertBox"></div>

      <!-- Tabla del carrito:
           El JS (renderCart) escribe las filas dentro de <tbody> -->
      <div class="table-responsive">
        <table class="table table-striped" id="cartTable">
          <thead>
            <tr>
              <th>Product</th>
              <th>Price</th>
              <th style="width: 140px;">Quantity</th>
              <th>Subtotal</th>
              <th>Actions</th>
            </tr>
          </thead>

          <!-- El JS llena este tbody con los productos del carrito -->
          <tbody></tbody>
        </table>
      </div>

      <!-- Total del carrito:
           El JS actualiza el <span id="cartTotal"> con el total calculado -->
      <div class="d-flex justify-content-end">
        <h4>Total: $<span id="cartTotal">0.00</span></h4>
      </div>

      <!-- Botón para crear la orden:
           El JS escucha click en #btnOrder y llama generateOrder(),
           que hace fetch al Orders Service -->
      <div class="d-flex justify-content-end mt-3">
        <button id="btnOrder" class="btn btn-success">Generate order</button>
      </div>

      <!-- Aquí el JS muestra el resultado de la orden creada
           (por ejemplo: Order ID) -->
      <div id="orderResult" class="mt-3"></div>
    </div>

    <!-- jQuery: se usa por Bootstrap y también por tu JS cuando cierra modales (en otros archivos) -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>

    <!-- Bootstrap JS: permite alertas cerrables y otros componentes interactivos -->
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>

    <!-- TU LÓGICA:
         Este script es el que:
         - lee/escribe el carrito en localStorage
         - renderiza la tabla
         - maneja cambiar cantidades y eliminar items
         - crea la orden llamando al microservicio de orders
         - maneja logout llamando al microservicio de users -->
    <script src="/static/scriptCart.js"></script>
  </body>
</html>
